# Load the OpenTelemetry module (must be at the top of the main nginx.conf)
load_module modules/ngx_otel_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # OpenTelemetry Configuration
    otel_trace on;
    otel_service_name mission-control-web-ui;
    
    # The OTel exporter is mandatory if tracing is enabled.
    # We set a dummy address here to satisfy the module's requirement 
    # without actually exporting yet.
    otel_exporter {
        endpoint localhost:4317;
        ## don't want the noisy logs, TODO: change when real exporter is available
        interval 24h;
        batch_size 1;
    }

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    server {
        listen 80;
        server_name localhost;

        # Return the Request ID (Correlation ID) to the client
        add_header X-Correlation-ID $request_id always;

        # Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "no-referrer-when-downgrade";
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';";

        root /usr/share/nginx/html;
        index index.html;

        location / {
            # Don't cache index.html or env-config.js
            if ($request_uri ~* "(/index.html|/env-config.js|/$)") {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend service
        location /api/ {
            # Use the name of your backend service in docker-compose.yml
            # In your case, it's 'server'
            # We add the versioned path here to ensure it's prepended if it's missing from the client request
            proxy_pass http://server:8080/api/mission-control/v1/;
            proxy_http_version 1.1;

            # Standard Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ensure the Backend knows the real source
            proxy_set_header Referer $http_referer;
            proxy_set_header Origin $http_origin;

            # OpenTelemetry Trace Propagation
            # Forward the traceparent header if it exists (from the frontend or a previous proxy)
            proxy_set_header traceparent $http_traceparent;
            # Enable OTel context injection for this location
            otel_trace_context inject;

            # Custom Correlation ID (Native Nginx $request_id)
            proxy_set_header X-Correlation-ID $request_id;

            # WebSocket support (just in case)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # Cache static assets (Vite hashes these names, so 1y is safe)
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
